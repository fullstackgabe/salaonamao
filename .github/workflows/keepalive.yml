name: Supabase Keep-Alive

on:
  schedule:
    - cron: '30 7 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (mantem o projeto ativo, evita o pause do free tier)
        env:
          SUPABASE_URL: https://rlgfqagvjmaridpvfeai.supabase.co
          SUPABASE_KEY: sb_publishable_QdUDEBd4ZEB3grYOH0rWpw_gt4oFJDP
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/services?select=*&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          echo "Supabase respondeu HTTP $code"
          if [ "$code" != "200" ]; then
            echo "Ping falhou (esperado 200)"
            exit 1
          fi
